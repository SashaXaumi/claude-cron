name = "claude-cron"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# Daily heartbeat. Per-job `next_run` controls actual cadence.
# Default: 13:00 UTC ~ 05:00-06:00 PT. Adjust to user timezone at setup.
[triggers]
crons = ["0 13 * * *"]

# D1 binding. `database_id` is INTENTIONALLY omitted so Cloudflare's
# auto-provisioning (launched Oct 2025) creates a fresh D1 on deploy and
# writes the id back into the user's forked copy of this file. This is the
# install model: one click on the Deploy-to-Cloudflare button forks the repo
# into the user's account, provisions D1, and deploys the Worker.
# Local `wrangler dev` also works -- a local D1 is created automatically.
# DO NOT add a `database_id` here in the template; that would tie the repo
# to one account and break the install path.
[[d1_databases]]
binding = "DB"
database_name = "claude-cron"

[vars]
# Resolver model. Bump via env if judgments are too coarse.
MODEL = "claude-opus-4-7"

# Secrets (NEVER put values in this file):
#   ANTHROPIC_API_KEY   -- wrangler secret put ANTHROPIC_API_KEY
#   RESEND_API_KEY      -- wrangler secret put RESEND_API_KEY
#   RECIPIENT_EMAIL     -- wrangler secret put RECIPIENT_EMAIL
#   RESEND_FROM         -- wrangler secret put RESEND_FROM  (verified Resend sender)
